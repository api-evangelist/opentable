specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: OpenTable
providerId: opentable
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
- Hospitality
- Reservations
- Restaurants
- Plans
description: OpenTable APIs are partner-only; no public/self-serve plan tiers exist. Restaurants pay subscription
  + per-cover fees for the OpenTable platform itself.
notes: 'Public API plans: contact OpenTable partnerships.'
sources:
- https://restaurant.opentable.com/products/
- https://dev.opentable.com/partner-portal
plans:
- id: opentable-restaurant-saas
  name: Restaurant Subscription (Basic / Core / Pro)
  type: paid
  description: Restaurants pay a monthly platform subscription plus per-cover fees for OpenTable network
    bookings.
  entries:
  - label: Monthly Platform
    name: platform_saas
    type: tiered
    metric: monthly
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: see restaurant.opentable.com
    userMultiplied: false
  - label: Per Network Cover
    name: network_cover
    type: per-unit
    metric: cover
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: varies
    userMultiplied: false
  elements:
  - name: Reservations
  - name: Network Bookings
- id: opentable-partner-api
  name: Partner API Access
  type: enterprise
  description: Contractual partner access; not self-serve.
  entries:
  - label: Partner Agreement
    name: partner
    type: flat
    metric: agreement
    limit: -1
    timeFrame: yearly
    geo: global
    unit: 1
    price: contact partnerships
    userMultiplied: false
  elements:
  - name: Approved Partner Endpoints
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
